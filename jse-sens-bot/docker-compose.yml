services:
  sens-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    image: jse-sens-bot:local
    command:
      [
        "python",
        "-m",
        "mvp_sens.scripts.run_etl",
        "--skip-fetch",
        "--parse-limit",
        "10",
      ]
    volumes:
      - ./mvp_sens/data:/app/mvp_sens/data
      - ./mvp_sens/db:/app/mvp_sens/db
      - ./mvp_sens/logs:/app/mvp_sens/logs
      - playwright-cache:/root/.cache/ms-playwright
    environment:
      - SENS_SKIP_WEEKENDS=1
    restart: "no"

  sens-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: jse-sens-bot:local
    profiles: ["scheduler"]
    command:
      [
        "python",
        "-m",
        "mvp_sens.scripts.scheduler_loop",
        "--limit",
        "20",
      ]
    volumes:
      - ./mvp_sens/data:/app/mvp_sens/data
      - ./mvp_sens/db:/app/mvp_sens/db
      - ./mvp_sens/logs:/app/mvp_sens/logs
      - playwright-cache:/root/.cache/ms-playwright
    environment:
      - SENS_SKIP_WEEKENDS=1
    restart: unless-stopped

  web-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: jse-sens-bot:local
    command: ["python", "-m", "mvp_sens.ui.app"]
    volumes:
      - ./mvp_sens/db:/app/mvp_sens/db
    environment:
      - SENS_UI_HOST=0.0.0.0
      - SENS_UI_PORT=5000
    expose:
      - "5000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./mvp_sens/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./mvp_sens/data:/usr/share/nginx/html/data:ro
    depends_on:
      - web-ui
    restart: unless-stopped

volumes:
  playwright-cache:
